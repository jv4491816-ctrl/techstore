<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
 
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🛒 TechStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>
 
  <main class="container my-5">
    <div class="row justify-content-center">
    <!-- justify-content-center: centra la columna horizontalmente -->
 
      <div class="col-md-6">
      <!-- col-md-6: ocupa 50% del ancho en pantallas medianas -->
 
        <h2 class="mb-4">Contáctanos</h2>
 
        <!-- Formulario de contacto -->
        <form id="form-contacto">
        <!-- id="form-contacto": JavaScript escucha este formulario -->
 
          <div class="mb-3">
          <!-- mb-3: margin-bottom para separar los campos -->
 
            <label for="nombre" class="form-label">Nombre</label>
            <!-- for="nombre": conecta el label con el input de abajo -->
 
            <input
              type="text"
              class="form-control"
              id="nombre"
              placeholder="Tu nombre completo"
              required>
            <!-- form-control: estilo de Bootstrap para inputs -->
            <!-- required: el campo no puede estar vacío -->
          </div>
 
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="tu@email.com"
              required>
            <!-- type="email": el navegador valida que sea un email válido -->
          </div>
 
          <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea
              class="form-control"
              id="mensaje"
              rows="4"
              placeholder="¿En qué podemos ayudarte?"
              required></textarea>
            <!-- textarea: área de texto de múltiples líneas -->
            <!-- rows="4": muestra 4 líneas visibles -->
          </div>
 
          <button type="submit" class="btn btn-primary w-100">
            Enviar mensaje
          </button>
          <!-- type="submit": al hacer clic dispara el evento "submit" del form -->
          <!-- w-100: width 100% — el botón ocupa todo el ancho -->
 
        </form>
 
        <!-- Aquí JavaScript mostrará la confirmación o el error -->
        <div id="respuesta-form" class="mt-3"></div>
 
      </div>
    </div>
  </main>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
