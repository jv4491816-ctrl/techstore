<!DOCTYPE html>
<!-- DOCTYPE: le dice al navegador que este es un archivo HTML5 -->
<html lang="es">
<!-- lang="es": indica que el contenido está en español -->
 
<head>
  <!-- HEAD: configuración de la página, no se muestra en pantalla -->
 
  <meta charset="UTF-8">
  <!-- charset: permite usar tildes y ñ sin problemas -->
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- viewport: hace que la página se adapte al tamaño del celular -->
 
  <title>TechStore — Gadgets y Tecnología</title>
  <!-- title: texto que aparece en la pestaña del navegador -->
 
  <!-- ↓ Bootstrap CSS desde internet (CDN) — no necesitas descargarlo -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
 
  <!-- ↓ Tu CSS personalizado — SIEMPRE después de Bootstrap -->
  <!-- Si lo pones antes, Bootstrap sobreescribe tus estilos -->
  <link rel="stylesheet" href="css/estilos.css">
</head>
 
<body>
  <!-- BODY: todo lo que el usuario ve en pantalla va aquí -->
 
 
  <!-- ═══════════════════════════════════════════════ -->
  <!-- NAVBAR — barra de navegación fija arriba        -->
  <!-- ═══════════════════════════════════════════════ -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <!-- navbar-dark: iconos/texto en blanco             -->
  <!-- bg-dark: fondo negro                            -->
  <!-- navbar-expand-lg: en pantallas grandes se expande, en chicas colapsa -->
 
    <div class="container">
    <!-- container: centra el contenido con márgenes automáticos -->
 
      <!-- Nombre / logo de la tienda -->
      <a class="navbar-brand fw-bold" href="index.html">🛒 TechStore</a>
      <!-- navbar-brand: estilo especial para el nombre principal -->
      <!-- fw-bold: font-weight bold (texto en negrita) -->
 
      <!-- Botón hamburguesa para móvil -->
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <!-- Este botón aparece solo en pantallas pequeñas -->
      <!-- data-bs-target="#menu": conecta con el div de abajo -->
 
      <!-- Links del menú -->
      <div class="collapse navbar-collapse" id="menu">
      <!-- id="menu": debe coincidir con data-bs-target del botón -->
 
        <ul class="navbar-nav ms-auto">
        <!-- ms-auto: margin-start auto — empuja los links a la derecha -->
 
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Inicio</a>
            <!-- active: resalta este link porque estamos en esta página -->
          </li>
 
          <li class="nav-item">
            <a class="nav-link" href="productos.html">Productos</a>
          </li>
 
          <li class="nav-item">
            <a class="nav-link" href="contacto.html">Contacto</a>
          </li>
 
        </ul>
      </div>
    </div>
  </nav>
  <!-- ═══ FIN NAVBAR ═══ -->
 
 
  <!-- ═══════════════════════════════════════════════ -->
  <!-- HERO — sección principal de bienvenida         -->
  <!-- ═══════════════════════════════════════════════ -->
  <section class="hero text-center py-5">
  <!-- py-5: padding vertical (arriba y abajo) grande -->
 
    <div class="container">
      <h1 class="display-4 fw-bold">Los mejores gadgets</h1>
      <!-- display-4: título muy grande de Bootstrap -->
 
      <p class="lead text-muted">Encuentra la tecnología que necesitas</p>
      <!-- lead: párrafo más grande que el normal -->
      <!-- text-muted: texto en gris suave -->
 
      <a href="productos.html" class="btn btn-primary btn-lg mt-3">
        Ver productos →
      </a>
      <!-- btn btn-primary: botón azul de Bootstrap -->
      <!-- btn-lg: botón grande -->
      <!-- mt-3: margin-top 3 -->
    </div>
  </section>
 
 
  <!-- ═══════════════════════════════════════════════ -->
  <!-- SECCIÓN: 3 tarjetas de características        -->
  <!-- ═══════════════════════════════════════════════ -->
  <section class="container my-5">
  <!-- my-5: margin vertical grande -->
 
    <div class="row g-4">
    <!-- row: fila del sistema de grilla -->
    <!-- g-4: gap (espacio) entre columnas -->
 
      <!-- Tarjeta 1 -->
      <div class="col-md-4">
      <!-- col-md-4: en pantallas medianas, ocupa 4 de 12 columnas (33%) -->
        <div class="card h-100 text-center p-4">
        <!-- h-100: height 100% (misma altura que las demás tarjetas) -->
          <div class="fs-1">📱</div>
          <!-- fs-1: font-size muy grande (para el emoji) -->
          <h5 class="mt-3">Smartphones</h5>
          <p class="text-muted">Los últimos modelos de las mejores marcas</p>
        </div>
      </div>
 
      <!-- Tarjeta 2 -->
      <div class="col-md-4">
        <div class="card h-100 text-center p-4">
          <div class="fs-1">💻</div>
          <h5 class="mt-3">Laptops</h5>
          <p class="text-muted">Potencia y portabilidad en un solo equipo</p>
        </div>
      </div>
 
      <!-- Tarjeta 3 -->
      <div class="col-md-4">
        <div class="card h-100 text-center p-4">
          <div class="fs-1">🎧</div>
          <h5 class="mt-3">Accesorios</h5>
          <p class="text-muted">Audífonos, cargadores y más gadgets</p>
        </div>
      </div>
 
    </div>
  </section>
 
 
  <!-- ↓ Bootstrap JS — SIEMPRE al final del body, antes de tu JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 
  <!-- ↓ Tu JavaScript — SIEMPRE el último en cargarse -->
  <script src="js/main.js"></script>
 
</body>
</html>
