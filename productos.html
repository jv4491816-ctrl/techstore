<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
 
  <!-- El mismo navbar en todas las páginas -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🛒 TechStore</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
          <!-- active está en Productos porque estamos en esta página -->
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>
 
  <main class="container my-5">
 
    <h2 class="mb-4">Nuestros Productos</h2>
 
    <!-- Botones de filtro por categoría -->
    <div class="mb-4" id="filtros">
    <!-- id="filtros": JavaScript usará este id para agregar botones -->
    </div>
 
    <!-- ↓ Este div es el más importante: aquí JavaScript dibujará los productos -->
    <div id="contenedor-productos" class="row g-4">
    <!-- id="contenedor-productos": JavaScript busca este id para insertar tarjetas -->
    <!-- row g-4: grilla Bootstrap con espacio entre columnas -->
 
      <!-- Mensaje de carga (JavaScript lo reemplazará) -->
      <p class="text-muted">Cargando productos...</p>
 
    </div>
 
  </main>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
